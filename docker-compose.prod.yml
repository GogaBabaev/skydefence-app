# Production: Caddy (TLS) → web (static) + api → PostgreSQL
# Usage: docker compose -f docker-compose.prod.yml up -d --build
services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        # Mini App calls the API on the same domain via /api
        VITE_API_URL: ''
    restart: unless-stopped

  api:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env.production
    environment:
      DATABASE_URL: postgresql://skydefence:${POSTGRES_PASSWORD:?set in .env}@postgres:5432/skydefence?schema=public
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?set in .env}
      APP_URL: ${APP_URL:?set in .env}
      API_BASE_URL: http://api:3000
      ADMIN_API_SECRET: ${ADMIN_API_SECRET:?set in .env}
      TELEGRAM_MANAGER_CHAT_ID: ${TELEGRAM_MANAGER_CHAT_ID:?set in .env}
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: skydefence
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: skydefence
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U skydefence']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  caddy_data:
  caddy_config:
