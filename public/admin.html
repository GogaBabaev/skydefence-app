<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyDefence — Админка</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }

  #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-box { background: #1a1d27; border: 1px solid #2d3148; border-radius: 12px; padding: 40px; width: 360px; }
  .login-box h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .login-box p { color: #94a3b8; font-size: 14px; margin-bottom: 24px; }

  input, select, textarea { width: 100%; padding: 10px 14px; background: #0f1117; border: 1px solid #2d3148; border-radius: 8px; color: #e2e8f0; font-size: 14px; outline: none; }
  input:focus, select:focus, textarea:focus { border-color: #6366f1; }
  label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; margin-top: 16px; }

  .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: #6366f1; color: white; }
  .btn-danger { background: #ef4444; color: white; }
  .btn-secondary { background: #2d3148; color: #e2e8f0; }
  .btn-sm { padding: 6px 12px; font-size: 13px; }

  header { background: #1a1d27; border-bottom: 1px solid #2d3148; padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 18px; font-weight: 700; flex: 1; }

  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

  .toolbar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .toolbar input[type=search] { flex: 1; min-width: 200px; }

  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; padding: 10px 12px; color: #94a3b8; font-weight: 600; border-bottom: 1px solid #2d3148; }
  td { padding: 10px 12px; border-bottom: 1px solid #1a1d27; vertical-align: middle; }
  tr:hover td { background: #1a1d27; }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
  .badge-active { background: #14532d; color: #86efac; }
  .badge-inactive { background: #450a0a; color: #fca5a5; }
  .badge-instock { background: #1e3a5f; color: #93c5fd; }

  img.thumb { width: 48px; height: 48px; object-fit: cover; border-radius: 6px; background: #2d3148; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: flex-start; justify-content: center; padding: 40px 16px; overflow-y: auto; }
  .modal-overlay.open { display: flex; }
  .modal { background: #1a1d27; border: 1px solid #2d3148; border-radius: 12px; width: 100%; max-width: 640px; padding: 28px; }
  .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .modal-footer { margin-top: 24px; display: flex; gap: 10px; justify-content: flex-end; }

  .upload-area { border: 2px dashed #2d3148; border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; color: #94a3b8; font-size: 14px; margin-top: 8px; }
  .upload-area:hover { border-color: #6366f1; color: #6366f1; }
  .preview-img { max-width: 120px; max-height: 120px; border-radius: 6px; margin-top: 8px; }

  .toast { position: fixed; bottom: 24px; right: 24px; background: #14532d; color: #86efac; padding: 12px 20px; border-radius: 8px; font-size: 14px; z-index: 200; display: none; }
  .toast.error { background: #450a0a; color: #fca5a5; }
  .toast.show { display: block; }

  #main-screen { display: none; }
  .stats { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
  .stat-card { background: #1a1d27; border: 1px solid #2d3148; border-radius: 10px; padding: 16px 20px; flex: 1; min-width: 140px; }
  .stat-card .val { font-size: 28px; font-weight: 700; color: #6366f1; }
  .stat-card .lbl { font-size: 13px; color: #94a3b8; margin-top: 4px; }

  .gallery-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .gallery-item { position: relative; }
  .gallery-item img { width: 64px; height: 64px; object-fit: cover; border-radius: 6px; }
  .gallery-item .rm { position: absolute; top: -6px; right: -6px; background: #ef4444; color: white; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

  @media (max-width: 768px) {
    .hide-mobile { display: none; }
    td, th { padding: 8px 6px; }
  }
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <h1>SkyDefence Admin</h1>
    <p>Введите секретный ключ для входа</p>
    <label>Admin Secret</label>
    <input type="password" id="secret-input" placeholder="skydef_admin_..." />
    <div style="margin-top:20px">
      <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Войти</button>
    </div>
  </div>
</div>

<!-- Main -->
<div id="main-screen">
  <header>
    <h1>SkyDefence Admin</h1>
    <button class="btn btn-primary btn-sm" onclick="openModal(null)">+ Добавить товар</button>
    <button class="btn btn-secondary btn-sm" onclick="logout()">Выйти</button>
  </header>

  <div class="container">
    <div class="stats">
      <div class="stat-card"><div class="val" id="stat-total">—</div><div class="lbl">Всего товаров</div></div>
      <div class="stat-card"><div class="val" id="stat-active">—</div><div class="lbl">Активных</div></div>
      <div class="stat-card"><div class="val" id="stat-instock">—</div><div class="lbl">В наличии</div></div>
    </div>

    <div class="toolbar">
      <input type="search" id="search" placeholder="Поиск по названию..." oninput="renderTable()" />
      <select id="filter-cat" onchange="renderTable()"><option value="">Все категории</option></select>
      <select id="filter-active" onchange="renderTable()">
        <option value="">Все статусы</option>
        <option value="1">Активные</option>
        <option value="0">Скрытые</option>
      </select>
    </div>

    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th>Фото</th>
            <th>Название</th>
            <th class="hide-mobile">Категория</th>
            <th>Цена</th>
            <th>Статус</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">Товар</h2>
    <form id="product-form" onsubmit="saveProduct(event)">
      <input type="hidden" id="f-id" />

      <label>Название *</label>
      <input type="text" id="f-name" required oninput="autoSlug()" />

      <label>Slug (URL) *</label>
      <input type="text" id="f-slug" required />

      <label>Категория *</label>
      <select id="f-category" required></select>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div>
          <label>Цена (₽)</label>
          <input type="number" id="f-price" placeholder="Оставьте пустым — цена по запросу" min="0" />
        </div>
        <div>
          <label>Старая цена (₽)</label>
          <input type="number" id="f-old-price" placeholder="Необязательно" min="0" />
        </div>
      </div>

      <label>Бейдж</label>
      <input type="text" id="f-badge" placeholder="Хит, Новинка, -20% ..." />

      <div style="display:flex;gap:16px;margin-top:16px">
        <label style="margin:0;display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" id="f-instock" style="width:auto" /> В наличии
        </label>
        <label style="margin:0;display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" id="f-active" style="width:auto" /> Активен
        </label>
      </div>

      <label>Краткое описание *</label>
      <textarea id="f-short" rows="2" required></textarea>

      <label>Полное описание *</label>
      <textarea id="f-full" rows="4" required></textarea>

      <label>Главное фото</label>
      <div id="main-image-preview"></div>
      <div class="upload-area" onclick="document.getElementById('f-image-upload').click()">
        Нажмите для загрузки фото
        <input type="file" id="f-image-upload" accept="image/*" style="display:none" onchange="uploadMainImage(this)" />
      </div>
      <input type="hidden" id="f-image" />

      <label>Галерея</label>
      <div id="gallery-preview" class="gallery-row"></div>
      <div class="upload-area" onclick="document.getElementById('f-gallery-upload').click()" style="margin-top:8px">
        Добавить фото в галерею
        <input type="file" id="f-gallery-upload" accept="image/*" style="display:none" onchange="uploadGalleryImage(this)" />
      </div>
      <input type="hidden" id="f-gallery" value="[]" />

      <label>Характеристики (JSON)</label>
      <textarea id="f-specs" rows="4" placeholder='[{"label":"Вес","value":"500г"}]'></textarea>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="closeModal()">Отмена</button>
        <button type="submit" class="btn btn-primary" id="save-btn">Сохранить</button>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api';
let secret = '';
let products = [];
let categories = [];
let editingGallery = [];

function getApiUrl() {
  return API;
}

async function apiFetch(path, opts = {}) {
  const res = await fetch(getApiUrl() + path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', 'X-Admin-Secret': secret, ...(opts.headers || {}) },
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || res.statusText);
  }
  return res.json();
}

async function doLogin() {
  secret = document.getElementById('secret-input').value.trim();
  if (!secret) return;
  try {
    await apiFetch('/admin/products');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
    localStorage.setItem('admin_secret', secret);
    await loadData();
  } catch {
    showToast('Неверный секретный ключ', true);
  }
}

function logout() {
  localStorage.removeItem('admin_secret');
  secret = '';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('main-screen').style.display = 'none';
}

async function loadData() {
  [products, categories] = await Promise.all([
    apiFetch('/admin/products'),
    apiFetch('/products/categories'),
  ]);

  document.getElementById('stat-total').textContent = products.length;
  document.getElementById('stat-active').textContent = products.filter(p => p.isActive).length;
  document.getElementById('stat-instock').textContent = products.filter(p => p.inStock && p.isActive).length;

  const sel = document.getElementById('filter-cat');
  sel.innerHTML = '<option value="">Все категории</option>';
  categories.forEach(c => {
    sel.innerHTML += `<option value="${c.slug}">${c.label}</option>`;
  });

  const fSel = document.getElementById('f-category');
  fSel.innerHTML = '';
  categories.forEach(c => {
    fSel.innerHTML += `<option value="${c.slug}">${c.label}</option>`;
  });

  renderTable();
}

function renderTable() {
  const q = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('filter-cat').value;
  const active = document.getElementById('filter-active').value;

  const filtered = products.filter(p => {
    if (q && !p.name.toLowerCase().includes(q)) return false;
    if (cat && p.categorySlug !== cat) return false;
    if (active === '1' && !p.isActive) return false;
    if (active === '0' && p.isActive) return false;
    return true;
  });

  const tbody = document.getElementById('table-body');
  tbody.innerHTML = filtered.map(p => `
    <tr>
      <td><img class="thumb" src="${p.image || ''}" onerror="this.src=''" /></td>
      <td>
        <div style="font-weight:600">${escHtml(p.name)}</div>
        <div style="font-size:12px;color:#64748b">${p.slug}</div>
        ${p.badge ? `<span class="badge badge-instock">${escHtml(p.badge)}</span>` : ''}
      </td>
      <td class="hide-mobile" style="color:#94a3b8;font-size:13px">${escHtml(p.category)}</td>
      <td style="white-space:nowrap">${p.price === null ? '<span style="color:#94a3b8">По запросу</span>' : p.price.toLocaleString('ru') + ' ₽'}</td>
      <td>
        <span class="badge ${p.isActive ? 'badge-active' : 'badge-inactive'}">${p.isActive ? 'Активен' : 'Скрыт'}</span>
        ${p.inStock ? '<span class="badge badge-instock" style="margin-left:4px">В наличии</span>' : ''}
      </td>
      <td style="white-space:nowrap">
        <button class="btn btn-secondary btn-sm" onclick="openModal(${p.id})">✏️</button>
        <button class="btn btn-danger btn-sm" style="margin-left:6px" onclick="deleteProduct(${p.id})">🗑</button>
      </td>
    </tr>
  `).join('');
}

function openModal(id) {
  const p = id ? products.find(x => x.id === id) : null;
  document.getElementById('modal-title').textContent = p ? 'Редактировать товар' : 'Добавить товар';
  document.getElementById('f-id').value = p ? p.id : '';
  document.getElementById('f-name').value = p ? p.name : '';
  document.getElementById('f-slug').value = p ? p.slug : '';
  document.getElementById('f-category').value = p ? p.categorySlug : (categories[0]?.slug || '');
  document.getElementById('f-price').value = p?.price ?? '';
  document.getElementById('f-old-price').value = p?.oldPrice ?? '';
  document.getElementById('f-badge').value = p?.badge ?? '';
  document.getElementById('f-instock').checked = p ? p.inStock : true;
  document.getElementById('f-active').checked = p ? p.isActive : true;
  document.getElementById('f-short').value = p ? p.shortDesc : '';
  document.getElementById('f-full').value = p ? p.fullDesc : '';
  document.getElementById('f-image').value = p ? p.image : '';
  document.getElementById('f-specs').value = p ? JSON.stringify(p.specs, null, 2) : '[]';

  editingGallery = p ? [...p.gallery] : [];
  renderGallery();

  const preview = document.getElementById('main-image-preview');
  preview.innerHTML = p?.image ? `<img class="preview-img" src="${p.image}" />` : '';

  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function autoSlug() {
  const idField = document.getElementById('f-id');
  if (idField.value) return;
  const name = document.getElementById('f-name').value;
  document.getElementById('f-slug').value = name
    .toLowerCase()
    .replace(/[аа]/g, 'a').replace(/[её]/g, 'e').replace(/[иий]/g, 'i')
    .replace(/[оо]/g, 'o').replace(/[уу]/g, 'u').replace(/[ыы]/g, 'y')
    .replace(/[эе]/g, 'e').replace(/[юю]/g, 'yu').replace(/[яя]/g, 'ya')
    .replace(/[бб]/g, 'b').replace(/[вв]/g, 'v').replace(/[гг]/g, 'g')
    .replace(/[дд]/g, 'd').replace(/[жж]/g, 'zh').replace(/[зз]/g, 'z')
    .replace(/[кк]/g, 'k').replace(/[лл]/g, 'l').replace(/[мм]/g, 'm')
    .replace(/[нн]/g, 'n').replace(/[пп]/g, 'p').replace(/[рр]/g, 'r')
    .replace(/[сс]/g, 's').replace(/[тт]/g, 't').replace(/[фф]/g, 'f')
    .replace(/[хх]/g, 'kh').replace(/[цц]/g, 'ts').replace(/[чч]/g, 'ch')
    .replace(/[шш]/g, 'sh').replace(/[щщ]/g, 'shch').replace(/[ъъ]/g, '')
    .replace(/[ьь]/g, '').replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

async function uploadMainImage(input) {
  const file = input.files[0];
  if (!file) return;
  try {
    const fd = new FormData();
    fd.append('file', file);
    const res = await fetch(getApiUrl() + '/admin/products/upload-image', {
      method: 'POST', headers: { 'X-Admin-Secret': secret }, body: fd,
    });
    const data = await res.json();
    document.getElementById('f-image').value = data.url;
    document.getElementById('main-image-preview').innerHTML = `<img class="preview-img" src="${data.url}" />`;
    showToast('Фото загружено');
  } catch (e) {
    showToast('Ошибка загрузки: ' + e.message, true);
  }
  input.value = '';
}

async function uploadGalleryImage(input) {
  const file = input.files[0];
  if (!file) return;
  try {
    const fd = new FormData();
    fd.append('file', file);
    const res = await fetch(getApiUrl() + '/admin/products/upload-image', {
      method: 'POST', headers: { 'X-Admin-Secret': secret }, body: fd,
    });
    const data = await res.json();
    editingGallery.push(data.url);
    renderGallery();
    showToast('Фото добавлено в галерею');
  } catch (e) {
    showToast('Ошибка загрузки: ' + e.message, true);
  }
  input.value = '';
}

function renderGallery() {
  const el = document.getElementById('gallery-preview');
  el.innerHTML = editingGallery.map((url, i) => `
    <div class="gallery-item">
      <img src="${url}" />
      <button class="rm" onclick="removeGalleryItem(${i})">×</button>
    </div>
  `).join('');
  document.getElementById('f-gallery').value = JSON.stringify(editingGallery);
}

function removeGalleryItem(i) {
  editingGallery.splice(i, 1);
  renderGallery();
}

async function saveProduct(e) {
  e.preventDefault();
  const id = document.getElementById('f-id').value;

  let specs;
  try { specs = JSON.parse(document.getElementById('f-specs').value || '[]'); }
  catch { showToast('Ошибка в JSON характеристик', true); return; }

  const priceVal = document.getElementById('f-price').value;
  const oldPriceVal = document.getElementById('f-old-price').value;

  const body = {
    slug: document.getElementById('f-slug').value.trim(),
    name: document.getElementById('f-name').value.trim(),
    categorySlug: document.getElementById('f-category').value,
    price: priceVal === '' ? null : Number(priceVal),
    oldPrice: oldPriceVal === '' ? null : Number(oldPriceVal),
    badge: document.getElementById('f-badge').value.trim() || undefined,
    inStock: document.getElementById('f-instock').checked,
    isActive: document.getElementById('f-active').checked,
    shortDesc: document.getElementById('f-short').value.trim(),
    fullDesc: document.getElementById('f-full').value.trim(),
    image: document.getElementById('f-image').value.trim(),
    gallery: JSON.parse(document.getElementById('f-gallery').value || '[]'),
    specs,
  };

  try {
    document.getElementById('save-btn').disabled = true;
    if (id) {
      await apiFetch(`/admin/products/${id}`, { method: 'PUT', body: JSON.stringify(body) });
      showToast('Товар обновлён');
    } else {
      await apiFetch('/admin/products', { method: 'POST', body: JSON.stringify(body) });
      showToast('Товар добавлен');
    }
    closeModal();
    await loadData();
  } catch (err) {
    showToast('Ошибка: ' + err.message, true);
  } finally {
    document.getElementById('save-btn').disabled = false;
  }
}

async function deleteProduct(id) {
  if (!confirm('Скрыть товар? (он не будет показан в каталоге)')) return;
  try {
    await apiFetch(`/admin/products/${id}`, { method: 'DELETE' });
    showToast('Товар скрыт');
    await loadData();
  } catch (err) {
    showToast('Ошибка: ' + err.message, true);
  }
}

function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Auto-login from localStorage
window.addEventListener('load', async () => {
  const saved = localStorage.getItem('admin_secret');
  if (saved) {
    secret = saved;
    try {
      await apiFetch('/admin/products');
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('main-screen').style.display = 'block';
      await loadData();
    } catch {
      localStorage.removeItem('admin_secret');
    }
  }
});

document.getElementById('secret-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});
</script>
</body>
</html>
