name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    name: Frontend — typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npx tsc --noEmit
      - run: npm test
      - run: npx vite build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist

  backend:
    name: Backend — typecheck, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npx prisma generate
      - run: npx tsc --noEmit
      - run: npm test

  migrations:
    name: Validate Prisma migrations against PostgreSQL
    runs-on: ubuntu-latest
    needs: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci --no-audit --no-fund
      - name: Apply migrations and seed
        run: |
          npx prisma migrate deploy
          npx prisma generate
          npm run seed
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test